<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Test Bot</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            color: #4e5d6c;
        }
        .timer {
            color: #e74c3c;
            background: #fdedec;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s ease;
            color: #333;
            width: 100%;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn.selected {
            background: #248bcf;
            color: white;
            border-color: #248bcf;
            font-weight: 500;
        }
        .navigation {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #2ecc71;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
